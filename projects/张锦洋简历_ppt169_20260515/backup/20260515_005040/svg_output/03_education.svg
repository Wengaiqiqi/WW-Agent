  <text x="775" y="429" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">数据库原理</text>
  <rect x="855" y="405" width="130" height="34" rx="17" fill="#1565C0" fill-opacity="0.08"/>
  <text x="920" y="429" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">操作系统</text>

  <rect x="490" y="450" width="130" height="34" rx="17" fill="#1565C0" fill-opacity="0.08"/>
