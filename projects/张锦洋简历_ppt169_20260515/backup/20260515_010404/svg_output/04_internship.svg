<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!--页眉-->
  <rect x="0" y="0" width="1280" height="100" fill="#F4F6F9"/>
  <rect x="0" y="96" width="1280" height="4" fill="url(#titleAccent)"/>
  <text x="60" y="58" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0D47A1">实习经历</text>
  <text x="60" y="82" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">Internship</text>

  <!--时间线-->
  <line x1="120" y1="180" x2="120" y2="500" stroke="#E0E0E0" stroke-width="2"/>
  <circle cx="120" cy="260" r="10" fill="#1565C0"/>
  <circle cx="120" cy="260" r="18" fill="#1565C0" fill-opacity="0.12"/>

  <!--公司卡片-->
  <rect x="180" y="160" width="1040" height="380" rx="16" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

  <!--顶部彩色条-->
  <rect x="180" y="160" width="1040" height="6" rx="3" fill="url(#titleAccent)"/>

  <!--公司名区域-->
  <rect x="180" y="166" width="1040" height="80" fill="#F4F6F9"/>
  <use data-icon="tabler-filled/briefcase" x="210" y="196" width="36" height="36" fill="#1565C0"/>

  <text x="265" y="212" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="28" font-weight="bold" fill="#212121">字节跳动</text>
  <text x="265" y="238" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#1565C0">数据标注师</text>

  <!--时间标签-->
  <rect x="960" y="180" width="200" height="36" rx="18" fill="#1565C0" fill-opacity="0.08"/>
  <text x="1060" y="205" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#1565C0">2025.9 ~ 2025.10</text>

  <!--职责内容-->
  <text x="210" y="290" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="20" font-weight="bold" fill="#0D47A1">工作职责</text>

  <circle cx="215" cy="330" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <text x="235" y="338" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" fill="#212121">参与字节跳动人工智能大模型（豆包）的监督微调（SFT）数据标注工作</text>

  <circle cx="215" cy="380" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <text x="235" y="388" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" fill="#212121">负责标注处理前端交互相关数据，严格遵循标注规范</text>

  <circle cx="215" cy="430" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <text x="235" y="438" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" fill="#212121">保证样本的准确性与一致性，确保模型训练数据的高质量</text>

  <!--能力标签-->
  <rect x="210" y="480" width="140" height="34" rx="17" fill="#1565C0" fill-opacity="0.08"/>
  <text x="280" y="504" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">SFT 数据标注</text>

  <rect x="365" y="480" width="140" height="34" rx="17" fill="#1565C0" fill-opacity="0.08"/>
  <text x="435" y="504" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">大模型训练</text>

  <rect x="520" y="480" width="140" height="34" rx="17" fill="#1565C0" fill-opacity="0.08"/>
  <text x="590" y="504" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">前端交互数据</text>

  <rect x="675" y="480" width="140" height="34" rx="17" fill="#1565C0" fill-opacity="0.08"/>
  <text x="745" y="504" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">质量控制</text>

  <!--页脚-->
  <text x="1220" y="700" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9E9E9E">04 / 13</text>
  <text x="60" y="700" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9E9E9E">张锦洋 · 个人简历</text>
</svg>
