    <path fill="#F4F6F9" d="M652,220 H1208 A12,12 0 0 1 1220,232 V498 A12,12 0 0 1 1208,510 H652 A12,12 0 0 1 640,498 V232 A12,12 0 0 1 652,220 Z" />
    <text x="670" y="255" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">技术栈</text>

    <path fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" d="M678,275 H827 A8,8 0 0 1 835,283 V303 A8,8 0 0 1 827,311 H678 A8,8 0 0 1 670,303 V283 A8,8 0 0 1 678,275 Z" />
