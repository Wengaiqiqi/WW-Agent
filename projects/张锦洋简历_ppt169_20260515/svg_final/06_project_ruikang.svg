    <rect x="0" y="96" width="1280" height="4" fill="url(#titleAccent)" />
    <text x="60" y="58" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0D47A1">项目经历</text>
    <text x="60" y="82" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">Projects</text>
  </g>

  <!-- Project title row -->
  <g id="project-title">
    <g transform="translate(60.0, 130.0) scale(1.6666666666666667)" fill="none" stroke="#1565C0" stroke-width="2">
      <path d="M6 6a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v4a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2l0 -4" />
      <path d="M12 2v2" />
      <path d="M9 12v9" />
      <path d="M15 12v9" />
      <path d="M5 16l4 -2" />
      <path d="M15 14l4 2" />
      <path d="M9 18h6" />
      <path d="M10 8v.01" />
      <path d="M14 8v.01" />
    </g>
    <text x="115" y="150" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="28" font-weight="bold" fill="#212121">睿抗机器人开发者大赛备赛开发</text>
    <text x="115" y="178" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#616161">技术负责人 · 2025.3 ~ 2025.8</text>
  </g>

  <!-- Result badge -->
  <g id="result-badge">
    <path fill="url(#resultBadge)" d="M972,125 H1208 A12,12 0 0 1 1220,137 V173 A12,12 0 0 1 1208,185 H972 A12,12 0 0 1 960,173 V137 A12,12 0 0 1 972,125 Z" />
    <g transform="translate(980.0, 142.0) scale(1.1666666666666667)" fill="#FFFFFF">
      <path d="M17 3a1 1 0 0 1 .993 .883l.007 .117v2.17a3 3 0 1 1 0 5.659v.171a6.002 6.002 0 0 1 -5 5.917v2.083h3a1 1 0 0 1 .117 1.993l-.117 .007h-8a1 1 0 0 1 -.117 -1.993l.117 -.007h3v-2.083a6.002 6.002 0 0 1 -4.996 -5.692l-.004 -.225v-.171a3 3 0 0 1 -3.996 -2.653l-.003 -.176l.005 -.176a3 3 0 0 1 3.995 -2.654l-.001 -2.17a1 1 0 0 1 1 -1h10zm-12 5a1 1 0 1 0 0 2a1 1 0 0 0 0 -2m14 0a1 1 0 1 0 0 2a1 1 0 0 0 0 -2" />
