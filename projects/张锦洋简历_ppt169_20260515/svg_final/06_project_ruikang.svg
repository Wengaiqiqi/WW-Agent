    <path fill="#F4F6F9" d="M72,220 H588 A12,12 0 0 1 600,232 V498 A12,12 0 0 1 588,510 H72 A12,12 0 0 1 60,498 V232 A12,12 0 0 1 72,220 Z" />
    <text x="90" y="255" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">项目描述</text>
    <text x="90" y="285" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#616161">针对百度智能车进行视觉识别与运行逻辑优化，实现复杂场景下的道路精准识别，提升智能车的环境适应能力。</text>

    <text x="90" y="340" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">个人职责</text>
    <circle cx="95" cy="370" r="4" fill="#1565C0" />
    <text x="110" y="376" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#212121">负责百度智能车视觉识别模型训练，选用 PPLCNet 模型并调整训练参数</text>
    <circle cx="95" cy="425" r="4" fill="#1565C0" />
    <text x="110" y="431" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#212121">优化训练集与测试集，完成智能车运行逻辑代码的设计与调试</text>
  </g>

