    <path fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" d="M858,275 H1007 A8,8 0 0 1 1015,283 V303 A8,8 0 0 1 1007,311 H858 A8,8 0 0 1 850,303 V283 A8,8 0 0 1 858,275 Z" />
    <text x="932" y="300" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">视觉识别</text>

    <path fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" d="M1038,275 H1187 A8,8 0 0 1 1195,283 V303 A8,8 0 0 1 1187,311 H1038 A8,8 0 0 1 1030,303 V283 A8,8 0 0 1 1038,275 Z" />
    <text x="1112" y="300" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">模型调参</text>

    <path fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" d="M678,325 H827 A8,8 0 0 1 835,333 V353 A8,8 0 0 1 827,361 H678 A8,8 0 0 1 670,353 V333 A8,8 0 0 1 678,325 Z" />
    <text x="752" y="350" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">智能车运行逻辑</text>

    <path fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" d="M858,325 H1007 A8,8 0 0 1 1015,333 V353 A8,8 0 0 1 1007,361 H858 A8,8 0 0 1 850,353 V333 A8,8 0 0 1 858,325 Z" />
    <text x="932" y="350" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">代码调试</text>

    <path fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" d="M1038,325 H1187 A8,8 0 0 1 1195,333 V353 A8,8 0 0 1 1187,361 H1038 A8,8 0 0 1 1030,353 V333 A8,8 0 0 1 1038,325 Z" />
    <text x="1112" y="350" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">百度智能车</text>

    <text x="670" y="400" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">项目成果</text>
    <text x="670" y="435" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#2E7D32">带领团队实现复杂光照、特殊路面下的道路精确识别，取得省级一等奖。</text>
