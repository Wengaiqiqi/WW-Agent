<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="resultBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!--页眉-->
  <rect x="0" y="0" width="1280" height="100" fill="#F4F6F9"/>
  <rect x="0" y="96" width="1280" height="4" fill="url(#titleAccent)"/>
  <text x="60" y="58" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0D47A1">项目经历</text>
  <text x="60" y="82" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">Projects</text>

  <!--项目标题区-->
  <use data-icon="tabler-outline/robot" x="60" y="130" width="40" height="40" fill="#1565C0"/>
  <text x="115" y="150" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="28" font-weight="bold" fill="#212121">中国机器人及人工智能大赛备赛开发</text>
  <text x="115" y="178" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#616161">技术负责人 · 2025.3 ~ 2025.8</text>

  <!--成果徽章-->
  <rect x="960" y="125" width="260" height="60" rx="12" fill="url(#resultBadge)"/>
  <use data-icon="tabler-filled/trophy" x="980" y="142" width="28" height="28" fill="#FFFFFF"/>
  <text x="1020" y="155" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">国家级二等奖</text>
  <text x="1020" y="175" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.8">国家级竞赛成果</text>

  <!--分隔线-->
  <line x1="60" y1="200" x2="1220" y2="200" stroke="#E0E0E0" stroke-width="1"/>

  <!--左栏：项目描述 + 个人职责-->
  <rect x="60" y="220" width="540" height="290" rx="12" fill="#F4F6F9"/>
  <text x="90" y="255" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">项目描述</text>
  <text x="90" y="285" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#616161">围绕开鸿机器人进行动作与代码逻辑设计开发，完成机器人多模式运行的功能搭建，保障比赛中各类场景下的任务执行能力。</text>

  <text x="90" y="340" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">个人职责</text>
  <circle cx="95" cy="370" r="4" fill="#1565C0"/>
  <text x="110" y="376" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#212121">负责开鸿机器人各项动作设计，除基础动作外，设计"倒地起身""奔跑"等舵机联动复杂动作，应对比赛突发情况</text>
  <circle cx="95" cy="425" r="4" fill="#1565C0"/>
  <text x="110" y="431" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#212121">主导机器人整体代码逻辑设计，完成"自动模式"下动作行为编排，以及遥控模式下"按键"与代码的逻辑映射</text>

  <!--右栏：技术栈 + 成果-->
  <rect x="640" y="220" width="580" height="290" rx="12" fill="#F4F6F9"/>

  <text x="670" y="255" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">技术栈</text>

  <rect x="670" y="275" width="165" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="752" y="300" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">机器人动作设计</text>

  <rect x="850" y="275" width="165" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="932" y="300" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">舵机控制</text>

  <rect x="1030" y="275" width="165" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="1112" y="300" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">代码逻辑开发</text>

  <rect x="670" y="325" width="165" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="752" y="350" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">遥控系统适配</text>

  <rect x="850" y="325" width="165" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="932" y="350" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">自动模式编排</text>

  <rect x="1030" y="325" width="165" height="36" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="1112" y="350" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#1565C0">开鸿机器人</text>

  <text x="670" y="400" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">项目成果</text>
  <text x="670" y="435" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#2E7D32">带领团队完成机器人开发与调试，最终斩获国家级二等奖。</text>

  <!--底部项目编号导航-->
  <rect x="60" y="540" width="1160" height="50" rx="10" fill="#F4F6F9"/>
  <rect x="80" y="552" width="36" height="26" rx="13" fill="#1565C0"/>
  <text x="98" y="571" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">1</text>
  <circle cx="220" cy="565" r="7" fill="#E0E0E0"/>
  <text x="220" y="570" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#9E9E9E">2</text>
  <circle cx="320" cy="565" r="7" fill="#E0E0E0"/>
  <text x="320" y="570" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#9E9E9E">3</text>
  <circle cx="420" cy="565" r="7" fill="#E0E0E0"/>
  <text x="420" y="570" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#9E9E9E">4</text>

  <!--页脚-->
  <text x="1220" y="700" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9E9E9E">05 / 13</text>
  <text x="60" y="700" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9E9E9E">张锦洋 · 个人简历</text>
</svg>
