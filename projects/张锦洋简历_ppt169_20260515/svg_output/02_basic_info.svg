<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>

  <!--背景-->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!--右上角装饰-->
  <circle cx="1200" cy="50" r="200" fill="#1565C0" fill-opacity="0.03"/>

  <!--页眉区域-->
  <rect x="0" y="0" width="1280" height="100" fill="#F4F6F9"/>
  <rect x="0" y="96" width="1280" height="4" fill="url(#titleAccent)"/>

  <!--页面标题-->
  <text x="60" y="58" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0D47A1">基本信息</text>
  <text x="60" y="82" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">Personal Information</text>

  <!--左侧：信息卡片区域-->
  <!--卡片1: 姓名 + 年龄-->
  <rect x="60" y="130" width="340" height="80" rx="12" fill="#F4F6F9"/>
  <use data-icon="tabler-filled/user" x="82" y="154" width="32" height="32" fill="#1565C0"/>
  <text x="130" y="165" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="20" font-weight="bold" fill="#212121">张锦洋</text>
  <text x="130" y="190" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">男 · 22岁 · 本科 · 群众</text>

  <!--卡片2: 电话-->
  <rect x="60" y="225" width="340" height="65" rx="12" fill="#F4F6F9"/>
  <use data-icon="tabler-filled/phone-call" x="82" y="244" width="28" height="28" fill="#1565C0"/>
  <text x="130" y="248" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">电话</text>
  <text x="130" y="272" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#212121">18991321768</text>

  <!--卡片3: 邮箱-->
  <rect x="60" y="305" width="340" height="65" rx="12" fill="#F4F6F9"/>
  <use data-icon="tabler-filled/mail" x="82" y="324" width="28" height="28" fill="#1565C0"/>
  <text x="130" y="328" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">邮箱</text>
  <text x="130" y="352" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#212121">3094084480@qq.com</text>

  <!--卡片4: 地址-->
  <rect x="60" y="385" width="340" height="65" rx="12" fill="#F4F6F9"/>
  <use data-icon="tabler-filled/map-pin" x="82" y="404" width="28" height="28" fill="#1565C0"/>
  <text x="130" y="408" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">地址</text>
  <text x="130" y="432" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#212121">南宁</text>

  <!--右侧：头像占位区 + 姓名大标题-->
  <rect x="460" y="130" width="760" height="320" rx="16" fill="#1565C0" fill-opacity="0.04"/>

  <text x="840" y="250" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="64" font-weight="bold" fill="#1565C0" fill-opacity="0.15" letter-spacing="20">张锦洋</text>

  <text x="840" y="320" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" fill="#0D47A1" fill-opacity="0.4" letter-spacing="4">人工智能专业 · 本科在读</text>

  <!--右侧底部标签行-->
  <rect x="500" y="380" width="160" height="40" rx="20" fill="#1565C0" fill-opacity="0.08"/>
  <text x="580" y="406" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">Python</text>

  <rect x="680" y="380" width="160" height="40" rx="20" fill="#1565C0" fill-opacity="0.08"/>
  <text x="760" y="406" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">C++</text>

  <rect x="860" y="380" width="160" height="40" rx="20" fill="#1565C0" fill-opacity="0.08"/>
  <text x="940" y="406" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">ROS2</text>

  <rect x="1040" y="380" width="160" height="40" rx="20" fill="#1565C0" fill-opacity="0.08"/>
  <text x="1120" y="406" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">Linux</text>

  <!--底部：教育信息快览-->
  <rect x="60" y="490" width="1160" height="140" rx="12" fill="#F4F6F9"/>
  <use data-icon="tabler-filled/school" x="90" y="520" width="36" height="36" fill="#1565C0"/>
  <text x="145" y="535" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" font-weight="bold" fill="#212121">广西民族大学</text>
  <text x="145" y="562" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#616161">人工智能专业 · 本科 · 2023.9 ~ 至今</text>
  <text x="145" y="590" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#1565C0">在校生 · 主攻AI与机器人方向</text>

  <use data-icon="tabler-filled/calendar" x="1000" y="525" width="28" height="28" fill="#616161"/>
  <text x="1040" y="547" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#616161">大二在读</text>

  <!--页脚-->
  <text x="1220" y="700" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9E9E9E">02 / 13</text>
  <text x="60" y="700" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9E9E9E">张锦洋 · 个人简历</text>
</svg>
