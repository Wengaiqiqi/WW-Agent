<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Web UI</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <!-- Auth view -->
  <div id="auth-view" class="auth-view hidden">
    <div class="auth-card">
      <h1>Agent</h1>
      <input id="auth-username" placeholder="用户名" autocomplete="username" />
      <input id="auth-password" type="password" placeholder="密码(≥6位)" autocomplete="current-password" />
      <input id="auth-signup-code" placeholder="注册码(注册时可能需要)" />
      <div class="auth-actions">
        <button id="btn-login">登录</button>
        <button id="btn-register">注册</button>
      </div>
      <div id="auth-error" class="error"></div>
    </div>
  </div>

  <!-- App view -->
  <div id="app-view" class="app-view hidden">
    <aside class="sidebar">
      <button id="btn-new-conv" class="new-conv">+ 新会话</button>
      <ul id="conv-list" class="conv-list"></ul>
      <div class="sidebar-footer">
        <span id="me-name"></span>
        <button id="btn-logout">登出</button>
      </div>
    </aside>
    <main class="chat">
      <header class="chat-header">
        <select id="model-select"></select>
        <button id="btn-endpoints" class="icon-btn" title="自定义端点">⚙</button>
        <span id="conv-title"></span>
      </header>
      <div id="messages" class="messages"></div>
      <form id="composer" class="composer">
        <textarea id="input" placeholder="发消息…(Enter 发送,Shift+Enter 换行)"></textarea>
        <button type="submit" id="btn-send">发送</button>
      </form>
    </main>
    <div id="endpoint-modal" class="modal hidden">
      <div class="modal-card">
        <button id="btn-close-endpoint" class="modal-close" aria-label="关闭">✕</button>
        <h2>自定义端点</h2>
        <ul id="endpoint-list" class="endpoint-list"></ul>
        <div class="endpoint-form">
          <input id="ep-label" placeholder="名称(如 My LLM)" />
          <input id="ep-base-url" placeholder="Base URL(如 https://api.openai.com/v1)" />
          <input id="ep-api-key" type="password" placeholder="API Key" />
          <input id="ep-model" placeholder="模型名(如 gpt-5.4)" />
          <select id="ep-protocol">
            <option value="openai">openai</option>
            <option value="anthropic">anthropic</option>
          </select>
          <div id="ep-error" class="error"></div>
          <button id="btn-save-endpoint">保存并使用</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
